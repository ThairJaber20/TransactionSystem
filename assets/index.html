<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المعاملات</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="css\style.css">
</head>

<body>

    <div class="sidebar">
        <h2>إدارة المعاملات</h2>

        <ul>
            <li><i class="fas fa-home"></i> الرئيسية</li>
            <li><i class="fas fa-folder"></i> المعاملات</li>
            <li><i class="fas fa-archive"></i> الأرشيف</li>
            <li><i class="fas fa-chart-bar"></i> التقارير</li>
            <li><i class="fas fa-cog"></i> الإعدادات</li>
        </ul>
    </div>

    <div class="main">

        <header>
            <h1>لوحة التحكم</h1>
            
        </header>

        <div class="cards">

            <div class="card">
                <h3>إجمالي المعاملات</h3>
                <p>125</p>
            </div>

            <div class="card">
                <h3>قيد التنفيذ</h3>
                <p>35</p>
            </div>

            <div class="card">
                <h3>منتهية</h3>
                <p>90</p>
            </div>

        </div>

        <div class="table-box">

            <h2>المعاملات</h2>

            <table>

                <thead>
                    <tr>
                        <th>رقم</th>
                        <th>التاريخ</th>
                        <th>الموضوع</th>
                        <th>الحالة</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>1001</td>
                        <td>01/07/2026</td>
                        <td>طلب تصريح</td>
                        <td>قيد التنفيذ</td>
                    </tr>

                    <tr>
                        <td>1002</td>
                        <td>02/07/2026</td>
                        <td>خطاب رسمي</td>
                        <td>منتهية</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
